name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Belt-and-suspenders: explicitly enable Pages with GitHub Actions as the
      # build source via the REST API. This is idempotent — if Pages is already
      # enabled, the 409 response is ignored. This removes the one-time manual
      # "Settings → Pages → Source: GitHub Actions" step.
      - name: Ensure Pages is enabled
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          status=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pages" \
            -d '{"build_type":"workflow"}') || true
          echo "POST /pages → HTTP $status"
          cat /tmp/pages.json || true
          if [ "$status" = "409" ] || [ "$status" = "201" ] || [ "$status" = "204" ]; then
            echo "Pages is enabled (or was already enabled)."
          else
            # Try PUT to update build_type on an already-enabled site
            put_status=$(curl -s -o /tmp/pages_put.json -w "%{http_code}" \
              -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/pages" \
              -d '{"build_type":"workflow"}') || true
            echo "PUT /pages → HTTP $put_status"
            cat /tmp/pages_put.json || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
