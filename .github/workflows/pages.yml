name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # NOTE: `administration` is NOT a valid workflow permission scope — GitHub
  # rejects the entire workflow file if it's listed here ("workflow file
  # issue"). Pages must be enabled once manually via
  #   gh api -X POST repos/:owner/:repo/pages -f build_type=workflow
  # or Settings → Pages → Source: GitHub Actions. After that, this workflow
  # just publishes.

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
